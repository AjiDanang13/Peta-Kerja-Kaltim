<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Peta UPT Pemasyarakatan — Kanwil Kalimantan Timur</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  
  <style>
    :root {
      --navy: #1a2e44;
      --navy-dark: #0f2035;
      --blue-mid: #1b3a5c;
      --gold: #c9a227;
      --gold-light: #e8c84a;
      --light: #f0f4f8;
      --white: #ffffff;
      --sidebar-bg: #1e3a52;
      --sidebar-border: rgba(201,162,39,0.25);
      --text-dim: rgba(240,244,248,0.55);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; font-family: 'Barlow', sans-serif; background: var(--navy); color: var(--light); }
    body { display: flex; flex-direction: column; }

    /* --- HEADER --- */
    header {
      background: linear-gradient(135deg, var(--navy-dark) 0%, var(--blue-mid) 60%, var(--navy-dark) 100%);
      border-bottom: 3px solid var(--gold);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 14px;
      z-index: 1000; flex-shrink: 0;
    }
    .logo-shield {
      width: 42px; height: 42px; flex-shrink: 0;
      background: url('assets/kemimipas-logo.png') center/contain no-repeat;
    }
    .header-text h1 {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1.15rem; font-weight: 800;
      color: var(--gold); text-transform: uppercase; line-height: 1.1;
    }
    .header-text p { font-size: .7rem; color: var(--text-dim); }
    
    .header-stats { margin-left: auto; display: flex; gap: 16px; }
    .stat-box { text-align: center; }
    .stat-box .num { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--gold-light); line-height: 1; }
    .stat-box .lbl { font-size: .6rem; color: var(--text-dim); text-transform: uppercase; }

    /* --- MAP --- */
    .main { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; z-index: 1; }

    /* --- UI CONTROLS (FABs) --- */
    .fab {
      position: absolute; z-index: 800;
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      transition: transform 0.2s, background 0.2s;
    }
    .fab:active { transform: scale(0.9); }
    
    #searchToggle { bottom: 24px; left: 14px; background: var(--gold); color: var(--navy-dark); font-size: 20px; }
    #resetZoomBtn { bottom: 24px; right: 14px; background: var(--navy); border: 2px solid var(--gold); color: var(--gold); flex-direction: column; }
    #legendBtn { bottom: 84px; right: 14px; background: var(--navy); border: 2px solid var(--gold); color: var(--gold); flex-direction: column; }
    
    .fab-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.5rem; font-weight: 800; text-transform: uppercase; }

    /* --- SEARCH PANEL --- */
    #searchPanel {
      position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(20px);
      width: min(340px, calc(100vw - 28px)); z-index: 799;
      background: var(--sidebar-bg); border: 1px solid var(--sidebar-border);
      border-radius: 16px; box-shadow: var(--shadow);
      max-height: 0; opacity: 0; pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #searchPanel.open { max-height: 60vh; opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
    
    .panel-inner { padding: 14px; border-bottom: 1px solid var(--sidebar-border); }
    #searchInput {
      width: 100%; padding: 10px 12px 10px 34px;
      background: rgba(255,255,255,.08); border: 1px solid var(--gold);
      border-radius: 8px; color: var(--white); outline: none;
    }
    .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .pill {
      padding: 4px 10px; border-radius: 20px; font-size: .65rem; font-weight: 700;
      cursor: pointer; border: 1px solid transparent; opacity: 0.4; transition: 0.2s;
    }
    .pill.active { opacity: 1; border-color: currentColor; }

    #facilityList { overflow-y: auto; max-height: 300px; }
    .facility-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .fi-name { font-weight: 700; font-size: 0.9rem; }
    .fi-city { font-size: 0.7rem; color: var(--text-dim); }

    /* --- POPUP & ANIMATIONS --- */
    .leaflet-popup-content-wrapper { border-radius: 16px !important; padding: 0 !important; overflow: hidden; }
    .leaflet-popup-content { margin: 0 !important; width: 280px !important; color: #333; }
    
    .popup-header { padding: 12px 16px; border-bottom: 1px solid #eee; }
    .popup-body { padding: 12px 16px; }
    
    /* Social Icons Base State */
    .social-btn {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(10px);
    }

    /* Fixed Double Animation Bug: Only animate when parent has .animate-in */
    .leaflet-popup.animate-in .social-btn {
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes popIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Staggered Delays */
    .leaflet-popup.animate-in .social-btn:nth-child(1) { animation-delay: 0.1s; }
    .leaflet-popup.animate-in .social-btn:nth-child(2) { animation-delay: 0.15s; }
    .leaflet-popup.animate-in .social-btn:nth-child(3) { animation-delay: 0.2s; }
    .leaflet-popup.animate-in .social-btn:nth-child(4) { animation-delay: 0.25s; }
    .leaflet-popup.animate-in .social-btn:nth-child(5) { animation-delay: 0.3s; }
    .leaflet-popup.animate-in .social-btn:nth-child(6) { animation-delay: 0.35s; }

    /* Cluster Bubbles */
    .city-cluster {
      background: var(--navy); border: 2px solid var(--gold);
      border-radius: 50%; color: var(--gold-light);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    @media (max-width: 600px) {
      .header-stats, .subtitle { display: none; }
      .header-text h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-shield"></div>
  <div class="header-text">
    <h1>Ditjen Pemasyarakatan Kaltim</h1>
    <p class="subtitle">Kementerian Imigrasi dan Pemasyarakatan</p>
  </div>
  <div class="header-stats">
    <div class="stat-box"><div class="num" id="count-shown">0</div><div class="lbl">Tampil</div></div>
    <div class="stat-box"><div class="num" id="count-total">0</div><div class="lbl">Total</div></div>
  </div>
</header>

<div class="main">
  <div id="map"></div>

  <div id="searchToggle" class="fab">🔍</div>
  
  <div id="resetZoomBtn" class="fab">
    <span>⊙</span><span class="fab-label">Reset</span>
  </div>

  <div id="legendBtn" class="fab">
    <span>🗺</span><span class="fab-label">Info</span>
  </div>

  <div id="searchPanel">
    <div class="panel-inner">
      <input type="text" id="searchInput" placeholder="Cari nama UPT..."/>
      <div class="filter-pills" id="pills">
        <div class="pill active" data-type="all" style="color:var(--gold)">Semua</div>
        <div class="pill" data-type="lapas" style="color:#4a9ede">Lapas</div>
        <div class="pill" data-type="rutan" style="color:#e8943a">Rutan</div>
        <div class="pill" data-type="bapas" style="color:#fb923c">Bapas</div>
      </div>
    </div>
    <div id="facilityList"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
// --- CONFIGURATION ---
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSKueAYOMUQ5THbJF-k6cE52r2b3RGBgc1OTOv9_kSqkfTmaEfo3yCxB35ZoLsf-6INvXuQiHMBvKgK/pub?output=csv';
const PHOTO_BASE = 'https://raw.githubusercontent.com/AjiDanang13/Peta-Kerja-Kaltim/main/assets/photos/';

const TYPES = {
  lapas:  { color: '#4a9ede', label: 'LAPAS', letter: 'L' },
  rutan:  { color: '#e8943a', label: 'RUTAN', letter: 'R' },
  lpp:    { color: '#e882b0', label: 'LPP',   letter: '♀' },
  lpka:   { color: '#a78bfa', label: 'LPKA',  letter: 'A' },
  lpn:    { color: '#2ec48a', label: 'LPN',   letter: 'N' },
  bapas:  { color: '#fb923c', label: 'BAPAS', letter: 'B' },
  kanwil: { color: '#f87171', label: 'KANWIL', letter: 'K' }
};

let facilities = [];
let markers = {};
let map, activeId = null;

// --- DATA FETCHING ---
Papa.parse(CSV_URL, {
  download: true, header: true, skipEmptyLines: true,
  complete: (results) => {
    facilities = results.data.map(row => ({
      id: parseInt(row.id),
      name: row.name,
      type: row.type.toLowerCase(),
      city: row.city,
      lat: parseFloat(row.lat),
      lng: parseFloat(row.lng),
      phone: row.phone || '—',
      gmaps: row.gmapsquery,
      social: {
        ig: row.instagram, fb: row.facebook, wa: row.whatsapp
      }
    })).filter(f => !isNaN(f.lat));
    
    initApp();
  }
});

// --- APP INITIALIZATION ---
function initApp() {
  document.getElementById('count-total').textContent = facilities.length;
  document.getElementById('count-shown').textContent = facilities.length;
  
  map = L.map('map', { zoomControl: false, minZoom: 6 }).setView([-0.4, 117], 7);
  
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

  facilities.forEach(f => {
    const m = L.marker([f.lat, f.lng], { icon: createCustomIcon(f) });
    m.bindPopup(createPopupHtml(f), { autoPanPadding: [50, 50] });
    m.on('click', () => focusFacility(f.id));
    markers[f.id] = m;
    m.addTo(map);
  });

  renderList(facilities);
  setupEvents();
}

// --- ICON CREATOR ---
function createCustomIcon(f, active = false) {
  const cfg = TYPES[f.type] || TYPES.lapas;
  const size = active ? 48 : 36;
  return L.divIcon({
    className: '',
    iconSize: [size, size],
    iconAnchor: [size/2, size],
    html: `
      <div style="width:${size}px; height:${size}px; background:${cfg.color}; 
           border: 3px solid #fff; border-radius: 50%; display: flex; 
           align-items: center; justify-content: center; color: #fff; 
           font-weight: 800; font-family: Barlow Condensed; 
           box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        ${cfg.letter}
      </div>`
  });
}

// --- POPUP BUILDER ---
function createPopupHtml(f) {
  const gLink = `https://www.google.com/maps/search/${encodeURIComponent(f.gmaps)}`;
  return `
    <div class="popup-card">
      <div class="popup-header">
        <div style="font-size:0.6rem; font-weight:800; color:${TYPES[f.type].color}">${TYPES[f.type].label}</div>
        <div style="font-family:Barlow Condensed; font-weight:800; font-size:1.1rem;">${f.name}</div>
      </div>
      <div class="popup-body">
        <div style="font-size:0.8rem; margin-bottom:10px;">📍 ${f.city}</div>
        <div style="display:flex; gap:8px; margin-bottom:15px;">
          ${f.social.ig ? `<a href="${f.social.ig}" target="_blank" class="social-btn" style="background:#e1306c; opacity:1">IG</a>` : ''}
          ${f.social.wa ? `<a href="${f.social.wa}" target="_blank" class="social-btn" style="background:#25d366; opacity:1">WA</a>` : ''}
          <a href="${gLink}" target="_blank" class="social-btn" style="background:#4285f4; flex:1; opacity:1; color:#fff; font-weight:700; font-size:0.7rem; text-decoration:none;">MAPS</a>
        </div>
      </div>
    </div>`;
}

// --- UI LOGIC ---
function focusFacility(id) {
  const f = facilities.find(x => x.id === id);
  if (!f) return;
  
  if (activeId && markers[activeId]) markers[activeId].setIcon(createCustomIcon(facilities.find(x => x.id === activeId), false));
  
  activeId = id;
  markers[id].setIcon(createCustomIcon(f, true));
  map.flyTo([f.lat, f.lng], 15, { duration: 1 });
  
  // Close search panel if open
  document.getElementById('searchPanel').classList.remove('open');
}

function renderList(data) {
  const container = document.getElementById('facilityList');
  container.innerHTML = data.map(f => `
    <div class="facility-item" onclick="focusFacility(${f.id})">
      <div style="width:10px; height:10px; border-radius:50%; background:${TYPES[f.type].color}"></div>
      <div>
        <div class="fi-name">${f.name}</div>
        <div class="fi-city">${f.city}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('count-shown').textContent = data.length;
}

// --- EVENT HANDLERS ---
function setupEvents() {
  // Search Toggle
  document.getElementById('searchToggle').onclick = () => {
    document.getElementById('searchPanel').classList.toggle('open');
  };

  // Search Input
  document.getElementById('searchInput').oninput = (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = facilities.filter(f => f.name.toLowerCase().includes(q) || f.city.toLowerCase().includes(q));
    renderList(filtered);
  };

  // Reset Zoom
  document.getElementById('resetZoomBtn').onclick = () => {
    map.flyTo([-0.4, 117], 7);
  };

  // Fix Double Animation Bug
  map.on('popupopen', (e) => {
    const el = e.popup._container;
    el.classList.remove('animate-in'); // Reset
    
    // Tiny delay to let Leaflet's auto-pan finish moving before starting animation
    setTimeout(() => {
      el.classList.add('animate-in');
    }, 100);
  });
}
</script>

</body>
</html>
